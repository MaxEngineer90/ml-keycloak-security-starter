name: CI

on:
  push:
    branches:
      - feature/implement-semver
      - main
  pull_request:
    branches:
      - feature/implement-semver
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for axion-release
        
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Display version
      run: ./gradlew currentVersion
      
    - name: Run tests
      run: ./gradlew test
      
    - name: Build
      run: ./gradlew build
      
    - name: Upload test reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: build/reports/tests/