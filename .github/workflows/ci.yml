name: Continuous Integration

on:
  push:
    branches:
      - main
      - feature/implement-semver    # CI läuft jetzt auch auf dem Feature-Branch
  pull_request:
    branches:
      - main
      - feature/implement-semver

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.1'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Java and Gradle versions
        run: |
          java -version
          ./gradlew --version

      - name: Run tests
        run: ./gradlew test

      - name: Build artifacts
        run: ./gradlew build
