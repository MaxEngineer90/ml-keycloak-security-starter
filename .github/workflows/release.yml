name: Release on Tag

on:
  push:
    tags:
      - 'v*'   # z.B. v1.0.0, v2.3.4 etc.
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.1'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine version via Axion
        id: version
        run: echo "VERSION=$(./gradlew currentVersion -q)" >> $GITHUB_OUTPUT

      - name: Run tests
        run: ./gradlew test

      - name: Build
        run: ./gradlew build

      - name: Publish to GitHub Packages
        run: ./gradlew publish --info
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}     # ← secret heißt nun GH_TOKEN
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            Release Notes für ${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}     # ← secret heißt nun GH_TOKEN

      - name: Summary
        run: |
          echo "### 🚀 Release Completed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View package: https://github.com/${{ github.repository }}/packages" >> $GITHUB_STEP_SUMMARY
