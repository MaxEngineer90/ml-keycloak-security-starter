# .github/workflows/dependabot-automerge.yml
name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v1
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run tests
      run: ./gradlew test
      
    - name: Auto-merge patch updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
      run: |
        echo "🔧 Auto-merging patch update: ${{ steps.metadata.outputs.dependency-names }}"
        gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Auto-approve safe minor updates
      if: |
        steps.metadata.outputs.update-type == 'version-update:semver-minor' &&
        contains(steps.metadata.outputs.dependency-names, 'lombok') ||
        contains(steps.metadata.outputs.dependency-names, 'gradle') ||
        contains(steps.metadata.outputs.dependency-names, 'junit')
      run: |
        echo "✅ Auto-approving safe minor update: ${{ steps.metadata.outputs.dependency-names }}"
        gh pr review --approve "${{ github.event.pull_request.number }}"
        gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Comment on major updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-major'
      run: |
        gh pr comment "${{ github.event.pull_request.number }}" --body "
        🚨 **Major Version Update**
        
        This is a major version update for: **${{ steps.metadata.outputs.dependency-names }}**
        
        **Please review carefully:**
        - Check for breaking changes in the changelog
        - Test thoroughly before merging
        - Consider updating related dependencies
        
        **Auto-merge disabled** for major updates for safety."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Label PRs by update type
      run: |
        case "${{ steps.metadata.outputs.update-type }}" in
          "version-update:semver-patch")
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "dependencies,auto-merge,patch"
            ;;
          "version-update:semver-minor")
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "dependencies,minor"
            ;;
          "version-update:semver-major")
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "dependencies,major,needs-review"
            ;;
        esac
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}